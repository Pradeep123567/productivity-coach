<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach — productivity assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">●</span>
        <div>
          <h1>Coach</h1>
          <p>your goals, kept honest</p>
        </div>
      </div>

      <div class="goals-section">
        <h2>Goals</h2>
        <div id="goals-list" class="goals-list">
          <p class="empty-state">Nothing saved yet — tell Coach what you're working towards.</p>
        </div>
      </div>
    </aside>

    <main class="chat">
      <div id="messages" class="messages"></div>

      <form id="chat-form" class="composer">
        <input
          id="chat-input"
          type="text"
          placeholder="Tell Coach what's on your mind..."
          autocomplete="off"
        />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
